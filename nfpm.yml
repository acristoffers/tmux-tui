# yaml-language-server: $schema=https://nfpm.goreleaser.com/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

name: "tmux-tui"
arch: "${ARCH}"
platform: "linux"
version: "1.1.1"
section: "default"
priority: "extra"
maintainer: "Álan e Sousa <alan@esousa.me>"
description: "Manages tmux sessions, windows and panes in a Terminal User Interface inspired by lazygit."
homepage: "https://github.com/acristoffers/tmux-tui"
license: "MPL"
release: "1${DIST_TAG}"
contents:
  - src: build-${ARCH}/tmux-tui
    dst: /usr/bin/tmux-tui
    file_info:
        mode: 0755
  - src: build/share/man/man1/tmux-tui.1
    dst: /usr/share/man/man1/tmux-tui.1
    file_info:
        mode: 0644
  - src: build/share/fish/completions/tmux-tui.fish
    dst: /usr/share/fish/vendor_completions.d/tmux-tui.fish
    file_info:
        mode: 0644
  - src: build/share/bash/completions/tmux-tui.bash
    dst: /usr/share/bash-completion/completions/tmux-tui
    file_info:
        mode: 0644
  - src: build/share/zsh/completions/_tmux-tui
    dst: /usr/share/zsh/site-functions/_tmux-tui
    file_info:
        mode: 0644
